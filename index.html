<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Gracielle Costa">
    <meta name="description" content="Formulário de convite para uma festa de aniversário">
    <title>Formulário de Convite</title>

    <link rel="stylesheet" href="index.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="container">

        <aside>

            <img src="assets/Background.png" alt="Imagem de um bolo fatiado com as cores do arco-iris e uma vela rosa e branco em cima">
            
            <div class="header">
                <img src="assets/Logo.svg" alt="Logo da festivite">
                
                <h1>Festivite</h1>
                
                <p>Crie um convite digital para o seu evento</p>
            </div>
        </aside>

        <main>
            
            <div class="main-title">
                <h2>Crie seu convite</h2>
            </div>

            <form action="#" method="post" enctype="multipart/form-data" aria-label="Formulário de criação de convite">

                <fieldset>
                    <legend>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M8 1.25C8.41421 1.25 8.75 1.58579 8.75 2V3.25H15.25V2C15.25 1.58579 15.5858 1.25 16 1.25C16.4142 1.25 16.75 1.58579 16.75 2V3.25H19C20.5188 3.25 21.75 4.48122 21.75 6V20C21.75 21.5188 20.5188 22.75 19 22.75H5C3.48122 22.75 2.25 21.5188 2.25 20V6C2.25 4.48122 3.48122 3.25 5 3.25H7.25V2C7.25 1.58579 7.58579 1.25 8 1.25ZM7.25 4.75H5C4.30964 4.75 3.75 5.30964 3.75 6V9.25H20.25V6C20.25 5.30964 19.6904 4.75 19 4.75H16.75V6C16.75 6.41421 16.4142 6.75 16 6.75C15.5858 6.75 15.25 6.41421 15.25 6V4.75H8.75V6C8.75 6.41421 8.41421 6.75 8 6.75C7.58579 6.75 7.25 6.41421 7.25 6V4.75ZM20.25 10.75H3.75V20C3.75 20.6904 4.30964 21.25 5 21.25H19C19.6904 21.25 20.25 20.6904 20.25 20V10.75Z"
                                fill="#869198" />
                        </svg>
                        Sobre o evento
                    </legend>

                    <div class="input-wrapper">
                        <label for="titulo">Título</label>
                        <input type="text" name="titulo" id="titulo" placeholder="Nome do evento">
                    </div>

                    <div class="grid-1">
                        <div class="input-wrapper">
                            <label for="inicio">Início</label>
                            <input type="datetime-local" name="inicio" id="inicio">
                        </div>
                        <div class="input-wrapper">
                            <label for="fim">Fim</label>
                            <input type="datetime-local" name="fim" id="fim" placeholder="DD/MM/AAAA --:--">
                        </div>
                        <div class="input-wrapper">

                            <label class="title">Tipo</label>

                            <div class="input-wrapper input-radio">
                                <input type="radio" name="tipo" id="presencial" checked>
                                <label for="presencial">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                                        <path fill-rule="evenodd" clip-rule="evenodd"

0939 9.8335 9.33325 9.8335H6.66658C6.39044 9.8335 6.16658 9.60964 6.16658 9.3335ZM6.16658 12.0002C6.16658 11.724 6.39044 11.5002 6.66658 11.5002H9.33325C9.60939 11.5002 9.83325 11.724 9.83325 12.0002C9.83325 12.2763 9.60939 12.5002 9.33325 12.5002H6.66658C6.39044 12.5002 6.16658 12.2763 6.16658 12.0002Z"
                                            fill="#869198" />
                                    </svg>
                                    Presencial
                                </label>

                                <input type="radio" name="tipo" id="online">
                                <label for="online">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                                        <path fill-rule="evenodd" clip-rule="evenodd"
                                            d="M2.66659 4.5C2.20635 4.5 1.83325 4.8731 1.83325 5.33333V10.6667C1.83325 11.1269 2.20635 11.5 2.66659 11.5H9.33325C9.79349 11.5 10.1666 11.1269 10.1666 10.6667V8.6735C10.1665 8.66864 10.1665 8.66378 10.1666 8.65892V7.00949C10.1665 7.00347 10.1665 6.99746 10.1666 6.99145V5.33333C10.1666 4.8731 9.79349 4.5 9.33325 4.5H2.66659ZM11.1666 6.12939V5.33333C11.1666 4.32081 10.3458 3.5 9.33325 3.5H2.66659C1.65406 3.5 0.833252 4.32081 0.833252 5.33333V10.6667C0.833252 11.6792 1.65406 12.5 2.66659 12.5H9.33325C10.3458 12.5 11.1666 11.6792 11.1666 10.6667V9.60093L13.8716 11.4043C13.9971 11.4878 14.1429 11.5357 14.2934 11.5429C14.444 11.5501 14.5937 11.5163 14.7266 11.4452C14.8595 11.374 14.9706 11.2682 15.0481 11.1389C15.1255 11.0096 15.1665 10.8617 15.1666 10.7109V5.24681C15.1666 5.24677 15.1666 5.24686 15.1666 5.24681C15.1666 5.10024 15.128 4.9561 15.0545 4.82923C14.9811 4.70231 14.8755 4.59702 14.7484 4.52398C14.6212 4.45094 14.477 4.41274 14.3304 4.41324C14.1838 4.41374 14.0399 4.45291 13.9133 4.52681L11.1666 6.12939ZM11.1666 7.28715V8.39908L14.1666 10.3991V5.53677L11.1666 7.28715Z"
                                            fill="#869198" />
                                    </svg>
                                    Online
                                </label>
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <label for="local">Local</label>
                            <input id="local" name="local" type="text" placeholder="Link ou endereço" autocomplete="off"/>
                        </div>
                    </div>

                    <div class="textarea-container">
                        <div class="textarea-wrapper">
                            <label for="descricao">Descrição</label>
                            <textarea name="descricao" id="descricao" rows="4" placeholder="Escreva sobre os detalhes do evento" ></textarea>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path fill-rule="evenodd" clip-rule="evenodd"

                                fill="#869198" />
                        </svg>

                        Personalização
                    </legend>

                    <div class="input-wrapper">
                        <p>Cor principal</p>

                        <div class="input-row">
                            <input type="radio" name="cor-principal" id="light-blue" value="#59B2FF" checked>
                            <label for="light-blue" style="--color-radio: #59B2FF"></label>
                            
                            <input type="radio" name="cor-principal" id="blue-violet" value="#6A59FF">
                            <label for="blue-violet" style="--color-radio: #6A59FF"></label>
                            
                            <input type="radio" name="cor-principal" id="purple" value="#B259FF">
                            <label for="purple" style="--color-radio: #B259FF"></label>
                            
                            <input type="radio" name="cor-principal" id="pink" value="#FF59F9">
                            <label for="pink" style="--color-radio: #FF59F9"></label>
                            
                            <input type="radio" name="cor-principal" id="coral-pink" value="#FF598B">
                            <label for="coral-pink" style="--color-radio: #FF598B"></label>
                            
                            <input type="radio" name="cor-principal" id="red" value="#FF5959">
                            <label for="red" style="--color-radio: #FF5959"></label>
                            
                            <input type="radio" name="cor-principal" id="orange" value="#FF8B59">
                            <label for="orange" style="--color-radio: #FF8B59"></label>
                            
                            <input type="radio" name="cor-principal" id="yellow" value="#FFCD59">
                            <label for="yellow" style="--color-radio: #FFCD59"></label>
                            
                            <input type="radio" name="cor-principal" id="lime-green" value="#E1FF59">
                            <label for="lime-green" style="--color-radio: #E1FF59"></label>
                            
                            <input type="radio" name="cor-principal" id="green" value="#59FF91">
                            <label for="green" style="--color-radio: #59FF91"></label>
                            
                            <input type="radio" name="cor-principal" id="cyan" value="#59FFF9">
                            <label for="cyan" style="--color-radio: #59FFF9"></label>
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <p>Tema do evento</p>

                        <div class="input-cards grid-2">
                            <input type="radio" name="cards" id="aniversario" value="aniversario">
                            <label for="aniversario">
                                <img src="assets/aniversario.png" alt="imagem representando uma festa de aniversario">
                                <span>Aniversário</span>
                            </label>

                            <input type="radio" name="cards" id="infantil" value="infantil">
                            <label for="infantil">
                                <img src="assets/infantil.png" alt="imagem representando uma festa de aniversario infantil">
                                <span>Infantil</span>
                            </label>

                            <input type="radio" name="cards" id="formatura" value="formatura">
                            <label for="formatura">
                                <img src="assets/formatura.png" alt="imagem representando uma formatura">
                                <span>Formatura</span>
                            </label>

                            <input type="radio" name="cards" id="casamento" value="casamento">
                            <label for="casamento">
                                <img src="assets/casamento.png" alt="imagem representando um casamento">
                                <span>Casamento</span>
                            </label>

                            <input type="radio" name="cards" id="cha-de-bebe" value="cha-de-bebe">
                            <label for="cha-de-bebe">
                                <img src="assets/chadebebe.png" alt="imagem representando um chá de bebê">
                                <span>Chá de bebê</span>
                            </label>

                            <input type="radio" name="cards" id="cha-de-panela" value="cha-de-panela">
                            <label for="cha-de-panela">
                                <img src="assets/chadepanela.png" alt="imagem representando uma festa de chá de panela">
                                <span>Chá de panela</span>
                            </label>

                            <input type="radio" name="cards" id="carnaval" value="carnaval">
                            <label for="carnaval">
                                <img src="assets/carnaval.png" alt="imagem representando festa de carnaval">
                                <span>Carnaval</span>
                            </label>

                            <input type="radio" name="cards" id="pascoa" value="pascoa">
                            <label for="pascoa">
                                <img src="assets/pascoa.png" alt="imagem representando a páscoa">
                                <span>Páscoa</span>
                            </label>

                            <input type="radio" name="cards" id="sao-joao" value="sao-joao">
                            <label for="sao-joao">
                                <img src="assets/saojoao.png" alt="imagem representando festa São João">
                                <span>São João</span>
                            </label>

                            <input type="radio" name="cards" id="halloween" value="halloween">
                            <label for="halloween">
                                <img src="assets/halloween.png" alt="imagem representando halloween">
                                <span>Halloween</span>
                            </label>

                            <input type="radio" name="cards" id="natal" value="natal">
                            <label for="natal">
                                <img src="assets/natal.png" alt="imagem representando natal">
                                <span>Natal</span>
                            </label>

                            <input type="radio" name="cards" id="outro" value="outro">
                            <label for="outro">
                                <img src="assets/outro.png" alt="imagem representando um encontro de amigos">
                                <span>Outro</span>
                            </label>
                        </div>

                        <div class="grid-3">
                            <div class="input-wrapper">
                                <label for="toggle">Estilo</label>

                                <div class="input-row-2">
                                    <input type="checkbox" id="toggle" class="input-checkbox">
                                    <label for="toggle" class="checkbox-label"></label>
                                    <span class="text-off">Escuro</span>
                                    <span class="text-on">Claro</span>
                                </div>
                            </div>

                            <div class="input-wrapper">
                                <label for="capa">Foto da capa</label>

                                <div class="input-row-2">
                                    <input type="file" id="foto-capa" name="foto-capa" accept="image/*" class="file-input" required>
                                    <label for="foto-capa" class="file-btn">

                                        Selecionar
                                    </label>
                                    <span class="status-empty">Nenhum arquivo selecionado</span>
                                    <span class="status-filled">image.png</span>
                                </div>

                                <span class="input-error error">

                            </div>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>
